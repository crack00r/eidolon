name: Eidolon
options:
  bundleIdPrefix: com.eidolon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: Eidolon/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Eidolon:
    type: application
    platform: iOS
    sources:
      - path: Eidolon
        excludes:
          - "**/*.xcassets"
      - path: Eidolon/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eidolon.ios
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: true
    entitlements:
      path: Eidolon/Eidolon.entitlements
      properties: {}
    preBuildScripts: []

schemes:
  Eidolon:
    build:
      targets:
        Eidolon: all
    run:
      config: Debug
    archive:
      config: Release
