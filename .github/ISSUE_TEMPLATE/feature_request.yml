name: Feature Request
description: Suggest a new feature for Eidolon
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core daemon
        - CLI
        - Memory engine
        - Cognitive loop
        - Self-learning
        - Voice/TTS/STT
        - Telegram
        - Desktop client
        - iOS client
        - GPU worker
        - Other
    validations:
      required: true
