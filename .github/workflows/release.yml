name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      # Per-package outputs (for monorepo)
      core_release_created: ${{ steps.release.outputs['packages/core--release_created'] }}
      cli_release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      desktop_release_created: ${{ steps.release.outputs['apps/desktop--release_created'] }}
      ios_release_created: ${{ steps.release.outputs['apps/ios--release_created'] }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Trigger desktop builds when a release is created
  trigger-desktop-build:
    name: Trigger Desktop Build
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.desktop_release_created == 'true'
    uses: ./.github/workflows/build-desktop.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit

  # Trigger iOS builds when a release is created
  trigger-ios-build:
    name: Trigger iOS Build
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.ios_release_created == 'true'
    uses: ./.github/workflows/build-ios.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit
