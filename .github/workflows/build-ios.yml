name: Build iOS

# iOS builds require an Apple Developer account ($99/year).
# This workflow is prepared for when signing credentials are available.
# It does NOT run automatically -- manual trigger only.

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g., v0.1.0)"
        required: false
        type: string
      version:
        description: "Version number (e.g., 0.1.0)"
        required: false
        type: string
  # Also listed under push so GitHub does not report phantom failures on push events.
  push:
    branches: ["__never__"]

permissions:
  contents: read

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      SCHEME: Eidolon
      PROJECT_PATH: apps/ios
      XCODE_VERSION: "16.0"

    steps:
      - name: Check signing prerequisites
        env:
          HAS_CERT: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' }}
          HAS_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          missing=""
          if [ "$HAS_CERT" != "true" ]; then missing="$missing IOS_BUILD_CERTIFICATE_BASE64"; fi
          if [ "$HAS_PROFILE" != "true" ]; then missing="$missing IOS_PROVISION_PROFILE_BASE64"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "iOS builds require an Apple Developer account (\$99/year)."
            echo "See: https://developer.apple.com/programs/"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      # --- Code signing ---
      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # --- Build ---
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.PROJECT_PATH }}/${{ env.SCHEME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}"

      - name: Build and archive
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_PATH }}/${{ env.SCHEME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/${{ env.SCHEME }}.xcarchive \
            -allowProvisioningUpdates \
            MARKETING_VERSION="${{ inputs.version || '0.0.1' }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/${{ env.SCHEME }}.xcarchive \
            -exportOptionsPlist ${{ env.PROJECT_PATH }}/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      # --- Upload ---
      - name: Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-${{ inputs.version || 'dev' }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload to TestFlight
        if: inputs.tag_name != '' && secrets.APP_STORE_CONNECT_API_KEY_ID != ''
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/${{ env.SCHEME }}.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # --- Cleanup ---
      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles || true
