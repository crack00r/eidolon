name: Build Desktop

on:
  # Triggered by release workflow
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      version:
        required: true
        type: string

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g., v0.1.0)"
        required: false
        type: string
      version:
        description: "Version number (e.g., 0.1.0)"
        required: false
        type: string

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-tauri:
    name: Build (${{ matrix.config.name }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg
          - name: macOS (Intel)
            runner: macos-13
            rust-target: x86_64-apple-darwin
            bundles: dmg
          - name: Windows
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - name: Linux (x64)
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.config.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- System dependencies (Linux only) ---
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # --- Runtime setup ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.rust-target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # --- Build ---
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -r build
        env:
          NODE_ENV: production

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.config.rust-target }} --bundles ${{ matrix.config.bundles }}
          tagName: ${{ inputs.tag_name || 'dev' }}
          releaseName: "Eidolon ${{ inputs.version || 'dev' }}"
          releaseBody: "See [CHANGELOG](https://github.com/crack00r/eidolon/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: ${{ contains(inputs.version || '0.', '0.') }}
          updaterJsonPreferNsis: true

      # --- Upload artifacts (always, even without release) ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.config.rust-target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.app
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.AppImage
          retention-days: 30
          if-no-files-found: warn
