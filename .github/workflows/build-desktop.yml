name: Build Desktop

on:
  # Triggered by release workflow
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      version:
        required: true
        type: string

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g., v0.1.0)"
        required: false
        type: string
      version:
        description: "Version number (e.g., 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build (${{ matrix.config.name }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg,updater
          - name: macOS (Intel)
            runner: macos-13
            rust-target: x86_64-apple-darwin
            bundles: dmg,updater
          - name: Windows
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - name: Linux (x64)
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.config.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # --- System dependencies (Linux only) ---
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # --- Runtime setup ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.config.rust-target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # --- Build ---
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -r build
        env:
          NODE_ENV: production

      - name: Build CLI sidecar binary
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          TARGET="${{ matrix.config.rust-target }}"
          if [[ "$TARGET" == *"windows"* ]]; then
            bun build packages/cli/src/index.ts --compile --outfile "apps/desktop/src-tauri/binaries/eidolon-cli-${TARGET}.exe"
          else
            bun build packages/cli/src/index.ts --compile --outfile "apps/desktop/src-tauri/binaries/eidolon-cli-${TARGET}"
          fi
          ls -la apps/desktop/src-tauri/binaries/

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for updater -- signing key must be configured in repository secrets
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.config.rust-target }} --bundles ${{ matrix.config.bundles }}
          tagName: ${{ inputs.tag_name || 'dev' }}
          releaseName: "Eidolon ${{ inputs.version || 'dev' }}"
          releaseBody: "See [CHANGELOG](https://github.com/crack00r/eidolon/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: true

      # --- Upload updater signature files ---
      - name: Upload updater signature artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: updater-${{ matrix.config.rust-target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.sig
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.zip
          retention-days: 30
          if-no-files-found: warn

      # --- Upload artifacts (always, even without release) ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-${{ matrix.config.rust-target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.config.rust-target }}/release/bundle/**/*.AppImage
          retention-days: 30
          if-no-files-found: warn
