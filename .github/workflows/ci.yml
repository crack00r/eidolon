name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Only run checks if workspace packages exist
      - name: Check for workspace packages
        id: check-packages
        run: |
          count=$(pnpm -r list --depth -1 --json 2>/dev/null | jq 'length' 2>/dev/null || echo "0")
          echo "package_count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt "1" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r lint

      - name: Prepare SvelteKit (generate tsconfig)
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm --filter @eidolon/web exec svelte-kit sync || true

      - name: Typecheck
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r typecheck

      - name: Test
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r test

      - name: Build
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r build

      - name: No packages yet
        if: steps.check-packages.outputs.has_packages != 'true'
        run: echo "No workspace packages found. CI will run checks once packages are added."
