name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Only run checks if workspace packages exist
      - name: Check for workspace packages
        id: check-packages
        run: |
          count=$(pnpm -r list --depth -1 --json 2>/dev/null | jq 'length' 2>/dev/null || echo "0")
          echo "package_count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt "1" ]; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r lint

      - name: Prepare SvelteKit (generate tsconfig)
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm --filter @eidolon/web exec svelte-kit sync 2>&1 || echo "::warning::SvelteKit sync failed (non-fatal)"

      - name: Typecheck
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r typecheck

      - name: Build
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r build

      - name: Test
        if: steps.check-packages.outputs.has_packages == 'true'
        run: pnpm -r test

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Cargo check & clippy (Desktop)
        run: |
          cd apps/desktop/src-tauri
          # Create placeholder sidecar binaries for cargo check/clippy (actual binaries built during release)
          mkdir -p binaries
          touch binaries/eidolon-cli-x86_64-unknown-linux-gnu
          cargo check 2>&1
          cargo clippy -- -W clippy::all 2>&1

      - name: Version sync check
        run: |
          PKG_VERSION=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          TAURI_VERSION=$(node -e "console.log(require('./apps/desktop/src-tauri/tauri.conf.json').version)")
          CARGO_VERSION=$(grep '^version' apps/desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ] || [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! package.json=$PKG_VERSION tauri.conf.json=$TAURI_VERSION Cargo.toml=$CARGO_VERSION"
            exit 1
          fi

      - name: No packages yet
        if: steps.check-packages.outputs.has_packages != 'true'
        run: echo "No workspace packages found. CI will run checks once packages are added."
