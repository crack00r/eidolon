services:
  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports:
      - "8420:8420"
    environment:
      - EIDOLON_GPU_API_KEY=${EIDOLON_GPU_API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
