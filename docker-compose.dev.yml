# Docker Compose for local Eidolon development.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml down
#
# This starts the Eidolon daemon with a development-friendly configuration:
# - Gateway on port 8419 (health, metrics, WebSocket)
# - Auth disabled for easy testing
# - Data persisted in a named volume
# - Source code mounted for live development
#
# Prerequisites:
#   - Docker and Docker Compose v2
#   - Bun installed inside the container (oven/bun base image)

services:
  eidolon:
    image: oven/bun:1.2-alpine
    container_name: eidolon-dev
    working_dir: /app
    command: >
      sh -c "
        bun install &&
        bun run packages/cli/src/index.ts daemon start --foreground
      "
    ports:
      - "8419:8419"
    volumes:
      - .:/app
      - eidolon-dev-data:/data
      - node_modules:/app/node_modules
    environment:
      EIDOLON_CONFIG: /app/docker-dev-config.json
      EIDOLON_DATA_DIR: /data
      EIDOLON_MASTER_KEY: dev-master-key-not-for-production
      EIDOLON_LOGGING__LEVEL: debug
      EIDOLON_LOGGING__FORMAT: pretty
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8419/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  eidolon-dev-data:
  node_modules:
